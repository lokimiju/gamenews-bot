<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameNews AI - Dashboard Jurnalis</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <link href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)" rel="stylesheet">
    <link href="[https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap)" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: #e2e8f0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        .article-content h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1rem; color: #f1f5f9; border-bottom: 1px solid #1e293b; padding-bottom: 0.5rem; }
        .article-content p { margin-bottom: 1rem; color: #cbd5e1; }
        .article-content .inline-source { background: rgba(30, 41, 59, 0.8); border-left: 3px solid #3b82f6; padding: 0.6rem 1rem; border-radius: 0.375rem; font-size: 0.85rem; margin-bottom: 1rem; }
        .article-content .inline-source a { color: #60a5fa; text-decoration: none; font-weight: 500;}
        
        @keyframes loading-slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
        .progress-bar-animated { animation: loading-slide 1.5s infinite ease-in-out; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-sm md:text-base">

    <!-- Sidebar -->
    <aside class="w-72 bg-[#0f172a] border-r border-gray-800 flex flex-col h-full z-30">
        <div class="h-20 flex items-center px-6 border-b border-gray-800 bg-[#111827]">
            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center mr-3"><i class="fa-solid fa-satellite-dish text-white"></i></div>
            <div><h1 class="text-lg font-bold text-white">GameNews<span class="text-blue-500">AI</span></h1></div>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-6">
            <div>
                <ul class="space-y-1.5">
                    <li><button onclick="navigate('dashboard')" id="nav-dashboard" class="nav-btn w-full flex items-center px-4 py-3 bg-blue-600/10 text-blue-500 rounded-xl"><i class="fa-solid fa-chart-pie w-7 text-lg"></i> Overview</button></li>
                    <li><button onclick="navigate('pending')" id="nav-pending" class="nav-btn w-full flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800/50 hover:text-white rounded-xl"><i class="fa-solid fa-inbox w-7 text-lg"></i> Perlu Direview</button></li>
                    <li><button onclick="navigate('approved')" id="nav-approved" class="nav-btn w-full flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800/50 hover:text-white rounded-xl"><i class="fa-solid fa-check-double w-7 text-lg"></i> Siap Publish</button></li>
                </ul>
            </div>
            <div>
                <p class="text-[0.7rem] uppercase text-gray-500 font-bold px-3 mb-2">Topik Riset</p>
                <ul id="topic-list" class="space-y-2 px-2"></ul>
                <div class="flex px-2 mt-2">
                    <input type="text" id="new-topic" class="w-full bg-[#1e293b] text-sm border border-gray-700 rounded-l-lg px-3 py-2 text-white outline-none" placeholder="Tambah...">
                    <button onclick="addTopic()" class="bg-blue-600 text-white px-3.5 rounded-r-lg"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
        </nav>

        <div class="p-5 border-t border-gray-800 bg-[#111827]">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center">
                    <i class="fa-solid fa-robot text-gray-400 text-2xl mr-3" id="bot-icon"></i>
                    <div><p class="text-sm font-bold text-white leading-none">Bot Status</p><p id="bot-status-text" class="text-xs text-gray-500">Standby</p></div>
                </div>
                <button onclick="showModal('settings-modal')" class="text-gray-500 hover:text-white p-2 bg-gray-800 rounded-lg"><i class="fa-solid fa-gear"></i></button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden bg-[#0b0f19]">
        <header class="h-20 flex items-center justify-between px-6 border-b border-gray-800 bg-[#0b0f19]/80 z-10">
            <h2 id="page-title" class="text-xl font-bold text-white">Overview</h2>
            <div class="flex items-center space-x-3">
                <div class="flex items-center bg-[#1e293b] border border-gray-700 rounded-xl p-1.5 pr-4">
                    <button id="toggle-autopilot" onclick="toggleAutoPilot()" class="relative inline-flex h-6 w-11 items-center rounded-full bg-gray-600 mr-3 transition-colors">
                        <span id="autopilot-knob" class="inline-block h-4 w-4 translate-x-1 rounded-full bg-white transition-transform"></span>
                    </button>
                    <span class="text-sm font-semibold text-gray-300">Auto-Pilot</span>
                </div>
                <button onclick="forceBotNow()" id="btn-force-bot" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all"><i class="fa-solid fa-bolt text-yellow-300 mr-2"></i> Paksa Riset</button>
            </div>
        </header>
        <div id="content-area" class="flex-1 overflow-y-auto p-6 lg:p-10"></div>
    </main>

    <!-- Modals & Toasts -->
    <div id="review-modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-6">
        <div class="bg-[#0f172a] rounded-2xl w-full max-w-5xl h-[90vh] flex flex-col border border-gray-700">
            <div class="p-6 border-b border-gray-800 flex justify-between"><h2 id="modal-title" class="text-xl font-bold text-white">Review</h2><button onclick="closeModal('review-modal')" class="text-white"><i class="fa-solid fa-times text-xl"></i></button></div>
            <div class="flex-1 p-8 overflow-y-auto article-content bg-[#1e293b]/30 outline-none" id="modal-article-body"></div>
            <div class="p-6 border-t border-gray-800 bg-[#0f172a]" id="modal-actions"></div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center">
        <div class="bg-[#0f172a] rounded-2xl w-full max-w-md border border-gray-700">
            <div class="p-6 border-b border-gray-800 flex justify-between"><h2 class="text-xl font-bold text-white"><i class="fa-brands fa-telegram text-blue-400"></i> Telegram</h2><button onclick="closeModal('settings-modal')" class="text-white"><i class="fa-solid fa-times"></i></button></div>
            <div class="p-6 space-y-4">
                <input type="password" id="tg-token" class="w-full bg-[#1e293b] border border-gray-700 rounded-lg px-4 py-2 text-white outline-none" placeholder="Bot Token">
                <input type="text" id="tg-chatid" class="w-full bg-[#1e293b] border border-gray-700 rounded-lg px-4 py-2 text-white outline-none" placeholder="Chat ID">
            </div>
            <div class="p-5 flex justify-end gap-3 border-t border-gray-800"><button onclick="closeModal('settings-modal')" class="text-gray-400">Batal</button><button onclick="saveTg()" class="bg-blue-600 text-white px-5 py-2 rounded-lg">Simpan</button></div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[60] flex flex-col space-y-3"></div>

    <script>
        let appState = { currentView: 'dashboard', topics: [], articles: [], isBotWorking: false, autoPilotOn: false, dailyGenerated: 0, taskStartTime: 0, tgToken: '', tgChatId: '' };

        // 1. Fungsi Mengambil Data Asli dari Server Node.js
        async function fetchState() {
            try {
                const res = await fetch('/api/state');
                if (res.ok) {
                    const data = await res.json();
                    appState = { ...data, currentView: appState.currentView };
                    updateUI();
                }
            } catch (err) { console.error("Koneksi Server Gagal", err); }
        }

        setInterval(fetchState, 3000);
        fetchState();

        // 2. Timer Akurat dari Database (Anti-Reset Refresh)
        setInterval(() => {
            if (!appState.isBotWorking || !appState.taskStartTime) return;
            const elapsed = Math.floor((Date.now() - appState.taskStartTime) / 1000);
            if (elapsed < 0) return;
            const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const s = String(elapsed % 60).padStart(2, '0');
            const timerEl = document.getElementById('card-timer-seconds');
            if (timerEl) timerEl.innerText = `${m}:${s}`;
        }, 1000);

        // 3. Update UI
        function updateUI() {
            const btnF = document.getElementById('btn-force-bot');
            if (appState.isBotWorking) {
                document.getElementById('bot-icon').className = "fa-solid fa-brain text-indigo-400 fa-bounce text-2xl mr-3";
                document.getElementById('bot-status-text').innerHTML = '<span class="text-indigo-400">Memproses...</span>';
                if(btnF) { btnF.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Sedang Bekerja'; btnF.disabled = true; btnF.className = "bg-gray-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold cursor-not-allowed"; }
            } else {
                document.getElementById('bot-icon').className = "fa-solid fa-robot text-gray-400 text-2xl mr-3";
                document.getElementById('bot-status-text').innerText = appState.autoPilotOn ? 'Auto-Pilot Aktif' : 'Standby';
                if(btnF) { btnF.innerHTML = '<i class="fa-solid fa-bolt text-yellow-300 mr-2"></i> Paksa Riset'; btnF.disabled = false; btnF.className = "bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all"; }
            }

            const knob = document.getElementById('autopilot-knob'), toggleBg = document.getElementById('toggle-autopilot');
            if(appState.autoPilotOn) { toggleBg.classList.replace('bg-gray-600', 'bg-blue-500'); knob.classList.replace('translate-x-1', 'translate-x-6'); } 
            else { toggleBg.classList.replace('bg-blue-500', 'bg-gray-600'); knob.classList.replace('translate-x-6', 'translate-x-1'); }

            const list = document.getElementById('topic-list'); list.innerHTML = '';
            appState.topics.forEach((t, i) => list.innerHTML += `<li class="flex justify-between text-xs text-gray-300 bg-gray-800/30 p-2 rounded-lg"><span>${t}</span><button onclick="remTopic(${i})" class="text-red-400"><i class="fa-solid fa-trash"></i></button></li>`);
            
            navigate(appState.currentView);
        }

        // 4. API Calls ke Server
        async function forceBotNow() {
            if(appState.isBotWorking) return;
            appState.isBotWorking = true; updateUI(); showToast("Mengirim Sinyal ke Server...");
            await fetch('/api/force', { method: 'POST' }); fetchState();
        }

        async function toggleAutoPilot() {
            await fetch('/api/settings/autopilot', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({status: !appState.autoPilotOn}) }); fetchState();
        }

        async function addTopic() {
            const val = document.getElementById('new-topic').value.trim();
            if(val) { await fetch('/api/topics/add', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({topic: val}) }); document.getElementById('new-topic').value = ''; fetchState(); }
        }

        async function remTopic(i) { await fetch('/api/topics/remove', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({index: i}) }); fetchState(); }
        
        async function saveTg() {
            await fetch('/api/settings/telegram', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({tgToken: document.getElementById('tg-token').value, tgChatId: document.getElementById('tg-chatid').value}) });
            closeModal('settings-modal'); showToast("Disimpan", "success"); fetchState();
        }

        async function actionArt(type, id) {
            if(type === 'approve') {
                await fetch('/api/articles/approve', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id: id, content: document.getElementById('modal-article-body').innerHTML}) });
            } else {
                await fetch('/api/articles/reject', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id: id}) });
            }
            closeModal('review-modal'); fetchState();
        }

        // 5. Render Views
        function navigate(view) {
            appState.currentView = view;
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('bg-blue-600/10', 'bg-transparent') || btn.classList.replace('text-blue-500', 'text-gray-400'));
            document.getElementById(`nav-${view}`).classList.replace('text-gray-400', 'text-blue-500');
            document.getElementById(`nav-${view}`).classList.add('bg-blue-600/10');
            
            document.getElementById('page-title').innerText = view === 'dashboard' ? 'Overview' : (view === 'pending' ? 'Perlu Direview' : 'Siap Publish');
            
            if(view === 'dashboard') {
                const p = appState.articles.filter(a => a.status === 'pending').length;
                document.getElementById('content-area').innerHTML = `
                    <div class="grid grid-cols-2 gap-6"><div class="bg-[#1e293b] p-6 rounded-2xl"><p class="text-gray-400">Total Limit</p><h3 class="text-3xl text-white font-bold">${appState.dailyGenerated} / 10</h3></div>
                    <div class="bg-[#1e293b] p-6 rounded-2xl"><p class="text-amber-500">Perlu Review</p><h3 class="text-3xl text-amber-400 font-bold">${p}</h3></div></div>
                `;
            } else {
                let html = appState.isBotWorking && view === 'pending' ? `
                    <div class="bg-indigo-900/40 border border-indigo-500/30 rounded-2xl p-6 mb-6 flex justify-between items-center relative overflow-hidden">
                        <div><h3 class="text-xl font-bold text-white">Mesin AI Sedang Bekerja...</h3><p class="text-indigo-200">Data sedang ditarik dan ditulis oleh AI.</p></div>
                        <div class="bg-black/30 p-4 rounded-xl text-center"><span id="card-timer-seconds" class="text-2xl font-mono text-white font-bold">00:00</span></div>
                        <div class="absolute bottom-0 left-0 w-full h-1 bg-white/5"><div class="h-1 bg-indigo-500 progress-bar-animated w-1/2"></div></div>
                    </div>` : '';

                const list = appState.articles.filter(a => a.status === view).reverse();
                if(list.length === 0 && !appState.isBotWorking) { document.getElementById('content-area').innerHTML = html + '<p class="text-gray-500 mt-10">Area Kosong.</p>'; return; }
                
                html += `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-10">${list.map(art => `
                    <div class="bg-[#1e293b] rounded-2xl border border-gray-700 shadow-xl flex flex-col h-full">
                        <div class="p-6 flex-1"><span class="text-xs bg-gray-800 text-blue-400 px-2 py-1 rounded-md mb-2 inline-block">${art.topic}</span>
                        <h3 class="text-xl font-black text-white mb-2">${art.title}</h3><p class="text-sm text-gray-400 line-clamp-2">${art.content.replace(/<[^>]*>?/gm, '')}</p></div>
                        <div class="bg-[#111827] p-5 border-t border-gray-800 flex justify-end">
                            <button onclick="openArt('${art.id}')" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-bold w-full md:w-auto">Buka Artikel</button>
                        </div>
                    </div>`).join('')}</div>`;
                document.getElementById('content-area').innerHTML = html;
            }
        }

        function openArt(id) {
            const art = appState.articles.find(a => a.id === id); if(!art) return;
            document.getElementById('modal-title').innerText = art.title;
            const b = document.getElementById('modal-article-body'); b.innerHTML = art.content;
            if (art.status === 'pending') {
                b.setAttribute('contenteditable', 'true');
                document.getElementById('modal-actions').innerHTML = `<div class="flex gap-3"><button onclick="actionArt('reject', '${id}')" class="w-full text-red-400 border border-red-500/30 py-3 rounded-xl font-bold">Hapus</button><button onclick="actionArt('approve', '${id}')" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Approve</button></div>`;
            } else {
                b.removeAttribute('contenteditable');
                document.getElementById('modal-actions').innerHTML = `<div class="flex gap-3"><button onclick="actionArt('reject', '${id}')" class="w-full text-red-400 border border-red-500/30 py-3 rounded-xl font-bold">Hapus</button><button onclick="copyHTML()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Copy HTML</button></div>`;
            }
            showModal('review-modal');
        }

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function showToast(msg) { const c = document.getElementById('toast-container'); const t = document.createElement('div'); t.className = "bg-gray-800 border-l-4 border-blue-500 p-4 rounded-xl text-white"; t.innerText = msg; c.appendChild(t); setTimeout(() => t.remove(), 3000); }
        function copyHTML() { navigator.clipboard.writeText(document.getElementById('modal-article-body').innerHTML); showToast("Dicopy!"); }
    </script>
</body>
</html>
